name: Publish to npm (tag)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node -e "const tag=process.env.TAG_NAME||''; const pkg=require('./package.json'); const v=pkg.version; const expected='v'+v; if(tag!==expected){console.error(`Tag ${tag} does not match package.json version ${v} (expected ${expected})`); process.exit(1);} console.log(`OK: ${tag} matches package.json version ${v}`);"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Publish (token)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

